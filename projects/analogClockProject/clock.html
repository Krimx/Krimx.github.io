<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link rel="stylesheet" href="dist/css/clock.min.css">
    <script src="JS/analog.js"></script>
</head>
<body onload="beginClock()">
    <main>
        <section class="clockContainer">
            <div class="clock">
                <p class="number n12">12</p>
                <p class="number n1">1</p>
                <p class="number n2">2</p>
                <p class="number n3">3</p>
                <p class="number n4">4</p>
                <p class="number n5">5</p>
                <p class="number n6">6</p>
                <p class="number n7">7</p>
                <p class="number n8">8</p>
                <p class="number n9">9</p>
                <p class="number n10">10</p>
                <p class="number n11">11</p>

                <div class="secondHand" id="secondHand"></div>
                <div class="minuteHand" id="minuteHand"></div>
                <div class="hourHand" id="hourHand"></div>
            </div>
        </section>
    </main>
</body>
</html>
