<body>
    <script>
    function dropdown() {
        document.getElementById("topbar").style.display = "none";
        document.getElementById("landing").style.display = "none";
        document.getElementById("content").style.display = "none";
        //document.getElementById("footer").style.display = "none";

        const menu = document.createElement("div");
        menu.className = "dropdownMenu";
        menu.id = "dropdownMenu";

        const button = document.createElement("button");
        button.className = "dropdownButton";
        button.onclick = function removeDropdown() {
            const toRemove = document.getElementById("dropdownMenu");
            document.body.removeChild(toRemove);

            document.getElementById("topbar").style.display = "flex";
            document.getElementById("landing").style.display = "flex";
            document.getElementById("content").style.display = "flex";
            //document.getElementById("footer").style.display = "flex";
        }
        button.appendChild(document.createElement("hr"));
        button.appendChild(document.createElement("hr"));
        button.appendChild(document.createElement("hr"));
        menu.appendChild(button);

        menu.appendChild(createNewDropdownLink("dropdownLink", "homeLink", "Home", "index.html"));
        menu.appendChild(createNewDropdownLink("dropdownLink", "projectsLink", "Projects", "projects.html"));
        menu.appendChild(createNewDropdownLink("dropdownLink", "aboutLink", "About", "about.html"));


        document.body.insertBefore(menu, document.body.children[0])
    }

    function createNewDropdownLink(classname, id, label, href) {
        const toMake = document.createElement("a");
        toMake.className = classname;
        toMake.id = id;
        toMake.innerHTML = "<p>" + label + "</p>";
        toMake.href = href;

        return toMake;
    }
    </script>
